name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs that need more grant it explicitly below.
permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Type check (ty)
        run: uv run ty check
        continue-on-error: true  # remove once ty is stable on all matrix entries

      - name: Test (pytest + coverage)
        run: uv run pytest --cov=cwms_tools --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Default dependency-review needs only contents: read (it reads the
    # dependency-graph compare API). No pull-requests scope: the PR-comment
    # summary is not enabled, so granting write would be an unused privilege.
    # Requires the repo's Dependency graph feature to be enabled.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4

  # Single stable required-status-check context for the branch ruleset. The test
  # matrix produces dynamic check names and the tag-only jobs never run on PRs,
  # so neither can be a required check; this aggregate gate can.
  ci-success:
    name: CI success
    needs: [test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on required jobs
        env:
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [ "$TEST_RESULT" != "success" ] || [ "$BUILD_RESULT" != "success" ]; then
            echo "required jobs failed: test=$TEST_RESULT build=$BUILD_RESULT"
            exit 1
          fi

  verify:
    name: Verify version consistency (on tag)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Tag matches pyproject and CHANGELOG versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          uv run python - "$tag" <<'PY'
          import re, sys, tomllib
          from pathlib import Path

          tag = sys.argv[1]
          pyproject = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]

          # Latest released section: first `## [X.Y.Z]` heading, skipping [Unreleased].
          m = re.search(
              r"^## \[(\d+\.\d+\.\d+[^\]]*)\]", Path("CHANGELOG.md").read_text(), re.M
          )
          changelog = m.group(1) if m else None

          errors = []
          if tag != pyproject:
              errors.append(f"git tag {tag!r} != pyproject version {pyproject!r}")
          if tag != changelog:
              errors.append(f"git tag {tag!r} != latest CHANGELOG version {changelog!r}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"OK: tag, pyproject, and CHANGELOG all agree on {tag}")
          PY

      - name: Manifest is in sync with pyproject and the live server
        run: uv run python scripts/gen_manifest.py --check

  publish:
    name: Publish to PyPI (on tag)
    runs-on: ubuntu-latest
    needs: [build, verify]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # OIDC trusted publishing
    environment: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # Make reruns safe: if this version was already uploaded (e.g. a later
          # job failed and the pipeline is rerun), treat it as a no-op instead
          # of failing on PyPI's duplicate-file error.
          skip-existing: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract CHANGELOG section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\["v"\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG section found for $version; falling back to tag name." >&2
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: release_notes.md
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  bundle:
    name: Build & attach MCPB bundle (on tag)
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # mcpb.yml uploads the .mcpb asset to the release
    uses: ./.github/workflows/mcpb.yml
    with:
      tag: ${{ github.ref_name }}
