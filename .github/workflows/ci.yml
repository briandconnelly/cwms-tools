name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs that need more grant it explicitly below.
permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Type check (ty)
        run: uv run ty check
        continue-on-error: true  # remove once ty is stable on all matrix entries

      - name: Test (pytest + coverage)
        run: uv run pytest --cov=cwms_tools --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  verify:
    name: Verify version consistency (on tag)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Tag matches pyproject and CHANGELOG versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          uv run python - "$tag" <<'PY'
          import re, sys, tomllib
          from pathlib import Path

          tag = sys.argv[1]
          pyproject = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]

          # Latest released section: first `## [X.Y.Z]` heading, skipping [Unreleased].
          m = re.search(
              r"^## \[(\d+\.\d+\.\d+[^\]]*)\]", Path("CHANGELOG.md").read_text(), re.M
          )
          changelog = m.group(1) if m else None

          errors = []
          if tag != pyproject:
              errors.append(f"git tag {tag!r} != pyproject version {pyproject!r}")
          if tag != changelog:
              errors.append(f"git tag {tag!r} != latest CHANGELOG version {changelog!r}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"OK: tag, pyproject, and CHANGELOG all agree on {tag}")
          PY

  publish:
    name: Publish to PyPI (on tag)
    runs-on: ubuntu-latest
    needs: [build, verify]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # OIDC trusted publishing
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Make reruns safe: if this version was already uploaded (e.g. a later
          # job failed and the pipeline is rerun), treat it as a no-op instead
          # of failing on PyPI's duplicate-file error.
          skip-existing: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract CHANGELOG section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\["v"\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG section found for $version; falling back to tag name." >&2
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
