name: Build MCPB bundle

# Pack the installable .mcpb bundle and attach it to a release. Called by the
# release pipeline in ci.yml (the `bundle` job) and runnable on demand to
# (re)attach a bundle to an existing tag.

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to attach the bundle to (e.g. v0.3.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build and attach the bundle to"
        required: true
        type: string

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the .mcpb asset to the release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }} # build the bundle from the tagged commit

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Sync project
        run: uv sync --all-extras

      - name: Verify manifest is in sync
        run: uv run python scripts/gen_manifest.py --check

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb@2.1.2 # pin for reproducible bundles

      - name: Validate manifest
        run: mcpb validate manifest.json

      - name: Compute versioned bundle path
        run: |
          version="$(python -c 'import json; print(json.load(open("manifest.json"))["version"])')"
          echo "BUNDLE=dist/cwms-tools-${version}.mcpb" >> "$GITHUB_ENV"

      - name: Pack bundle
        run: |
          mkdir -p dist
          mcpb pack . "$BUNDLE"

      - name: Assert bundle excludes secrets and dev files
        run: |
          contents="$(unzip -Z1 "$BUNDLE")"
          echo "$contents"
          if echo "$contents" | grep -E -i \
            '(^|/)(\.env|\.git/|\.github/|\.venv/|tests/|docs/|scripts/|Makefile$|prek\.toml$|cwms-overview\.md$|__pycache__/|\.coverage$|\.pytest_cache/|\.ruff_cache/)'; then
            echo "::error::Forbidden path found in .mcpb bundle"
            exit 1
          fi

      - name: Upload bundle to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }} # via env to avoid shell injection from the input
        run: gh release upload "$TAG" "$BUNDLE" --clobber

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cwms-tools-mcpb
          path: ${{ env.BUNDLE }}
          if-no-files-found: error
